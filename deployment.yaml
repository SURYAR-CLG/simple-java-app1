apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-java-app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-java-app1
  template:
    metadata:
      labels:
        app: simple-java-app1
    spec:
      containers:
        - name: simple-java-app1
          image: suryar07/java-app:latest
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  type: NodePort
  selector:
    app: simple-java-app1
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008
